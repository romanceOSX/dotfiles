# eza theme — pastel rainbow, full truecolor (hex), no 16-colour fallbacks.
# Palette: rose C58EA7 · mint 94F7E4 · green A3DCBF (cyan-leaning) · purple CF94F7 ·
#          peach F6CF94 · blue 9EC4FE · amber E0A064 · dim 5A5058 · text C8C0C5
colourful: true

filekinds:
  normal:        {foreground: "#C8C0C5"}
  directory:     {foreground: "#94F7E4", is_bold: true}
  symlink:       {foreground: "#94F7E4"}
  pipe:          {foreground: "#F6CF94"}
  block_device:  {foreground: "#9EC4FE"}
  char_device:   {foreground: "#CF94F7"}
  socket:        {foreground: "#CF94F7"}
  special:       {foreground: "#F6CF94"}
  executable:    {foreground: "#A3DCBF", is_bold: true}
  mount_point:   {foreground: "#9EC4FE"}

perms:
  user_read:           {foreground: "#A3DCBF"}
  user_write:          {foreground: "#F6CF94"}
  user_execute_file:   {foreground: "#E0A064"}
  user_execute_other:  {foreground: "#E0A064"}
  group_read:          {foreground: "#A3DCBF"}
  group_write:         {foreground: "#F6CF94"}
  group_execute:       {foreground: "#E0A064"}
  other_read:          {foreground: "#A3DCBF"}
  other_write:         {foreground: "#F6CF94"}
  other_execute:       {foreground: "#E0A064"}
  special_user_file:   {foreground: "#E0A064"}
  special_other:       {foreground: "#F6CF94"}
  attribute:           {foreground: "#5A5058"}

size:
  major:        {foreground: "#CF94F7"}
  minor:        {foreground: "#5A5058"}
  number_byte:  {foreground: "#CF94F7"}
  number_kilo:  {foreground: "#CF94F7"}
  number_mega:  {foreground: "#CF94F7"}
  number_giga:  {foreground: "#CF94F7"}
  number_huge:  {foreground: "#CF94F7"}
  unit_byte:    {foreground: "#5A5058"}
  unit_kilo:    {foreground: "#5A5058"}
  unit_mega:    {foreground: "#5A5058"}
  unit_giga:    {foreground: "#5A5058"}
  unit_huge:    {foreground: "#5A5058"}

users:
  user_you:     {foreground: "#A3DCBF"}
  user_other:   {foreground: "#5A5058"}
  user_root:    {foreground: "#E0A064"}
  group_yours:  {foreground: "#CF94F7"}
  group_other:  {foreground: "#5A5058"}
  group_root:   {foreground: "#E0A064"}

links:
  normal:           {foreground: "#94F7E4"}
  multi_link_file:  {foreground: "#F6CF94"}

git:
  new:         {foreground: "#A3DCBF"}
  modified:    {foreground: "#F6CF94"}
  deleted:     {foreground: "#E0A064"}
  renamed:     {foreground: "#CF94F7"}
  typechange:  {foreground: "#94F7E4"}
  ignored:     {foreground: "#5A5058"}
  conflicted:  {foreground: "#C58EA7"}

git_repo:
  branch_main:  {foreground: "#A3DCBF"}
  branch_other: {foreground: "#F6CF94"}
  git_clean:    {foreground: "#A3DCBF"}
  git_dirty:    {foreground: "#F6CF94"}

# file extension categories — this is what fixes the harsh 16-colour fallback
# (e.g. flake.nix / Makefile fell into `build`).
file_type:
  image:       {foreground: "#CF94F7"}
  video:       {foreground: "#E0A064"}
  music:       {foreground: "#94F7E4"}
  lossless:    {foreground: "#94F7E4"}
  crypto:      {foreground: "#C58EA7"}
  document:    {foreground: "#9EC4FE"}
  compressed:  {foreground: "#F6CF94"}
  temp:        {foreground: "#5A5058"}
  compiled:    {foreground: "#C58EA7"}
  build:       {foreground: "#F6CF94"}
  source:      {foreground: "#A3DCBF"}

punctuation:          {foreground: "#5A5058"}
date:                 {foreground: "#9EC4FE"}
inode:                {foreground: "#5A5058"}
blocks:               {foreground: "#5A5058"}
header:               {foreground: "#CF94F7", is_bold: true, is_underline: true}
octal:                {foreground: "#94F7E4"}
flags:                {foreground: "#F6CF94"}
symlink_path:         {foreground: "#94F7E4"}
control_char:         {foreground: "#E0A064"}
broken_symlink:       {foreground: "#E0A064", is_bold: true}
broken_path_overlay:  {foreground: "#E0A064", is_underline: true}
