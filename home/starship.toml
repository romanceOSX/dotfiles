"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
scan_timeout = 1000

format = """
${custom.rainbow}\
$nix_shell\
$cmd_duration\
$character"""

[custom.rainbow]
command = "rainbow-prompt"
when = "true"
format = "$output "


[cmd_duration]
format = "[$duration]($style) "
style = "blue"

# Marker when inside `nix develop` / `nix-shell`. Pastel-peach to match the
# rainbow palette. Heuristic mode also detects flake-based dev shells.
[nix_shell]
disabled = false
heuristic = false
symbol = "❄️"
format = "[$symbol]($style) "
style = "bold #F6CF94"

[character]
success_symbol = "[❯](#c4a0e8)"
error_symbol = "[❯](#ffb3b3)"
vimcmd_symbol = "[❮](#a0d8ef)"
